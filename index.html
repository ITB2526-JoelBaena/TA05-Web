<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Actividad de Joel</title>
  <style>
    body {
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
    }
    h1 {
      color: #fff;
      margin-top: 50px;
      font-size: 3em;
      text-shadow: 2px 2px 5px rgba(0,0,0,0.3);
    }
    .heart {
      position: relative;
      width: 200px;
      height: 180px;
      margin: 50px auto;
      background-color: red;
      transform: rotate(-45deg);
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }
    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background-color: red;
    }
    .heart::before {
      top: -100px;
      left: 0;
    }
    .heart::after {
      left: 100px;
      top: 0;
    }
    .heart-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(45deg);
      color: white;
      font-size: 1.5em;
      font-weight: bold;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>
  <h1>Joel</h1>
  <div class="heart">
    <div class="heart-text">Javier Amaya</div>
  </div>
</body>
</html>
