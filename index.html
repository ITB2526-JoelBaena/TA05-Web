<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Joel Baena + Javier Amaya</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(to bottom, #f8cdda, #fbc2eb);
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
    }

    .heart {
      position: relative;
      width: 200px;
      height: 180px;
      margin: 100px auto;
      background-color: red;
      transform: rotate(-45deg);
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }

    .heart::before {
      content: "";
      position: absolute;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background-color: red;
      top: -100px;
      left: 0;
    }

    .heart::after {
      content: "";
      position: absolute;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background-color: red;
      left: 100px;
      top: 0;
    }

    .heart-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(45deg);
      color: white;
      font-size: 1.3em;
      font-weight: bold;
      text-align: center;
      white-space: nowrap;
    }
  </style>
</head>
<body>
   <div class="heart-text">Joel Baena +<br>Javier Amaya</div>
  </div>
</body>
</html>
